<!DOCTYPE html>
<html lang="{{ post.lang if post.lang else 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO & Canonical (대표 주소) -->
    <title>{{ post.title }} - OKJinja</title>
    <meta name="description" content="{{ post.summary }}">
    <link rel="canonical" href="https://okjinja.com/shrine/{{ post.id }}" />

    <!-- Analytics (새로 발급받은 Google Analytics 4 코드 적용) -->
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NZE8KSDC7X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-NZE8KSDC7X');
    </script>

    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .detail-container { max-width: 800px; margin: 0 auto; padding: 20px; background: #fff; }
        .detail-header { text-align: center; margin-bottom: 40px; }
        .detail-title { font-size: 2rem; margin-bottom: 10px; color: #333; }
        .detail-meta { color: #666; font-size: 0.9rem; }
        .detail-img { width: 100%; height: auto; border-radius: 10px; margin-bottom: 30px; }
        .detail-content { font-size: 1.1rem; line-height: 1.8; color: #444; }
        .detail-content h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 40px; color: #d35400; }
        .detail-content img { max-width: 100%; height: auto; display: block; margin: 20px auto; border-radius: 5px; }
        .back-btn { display: inline-block; margin-top: 40px; padding: 10px 20px; background: #333; color: white; text-decoration: none; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header style="padding: 20px;">
            <a href="/">
                <img src="/static/images/logo.jpg" alt="OKJinja" style="height: 60px; display: block; margin: 0 auto;">
            </a>
        </header>

        <article class="detail-container">
            <div class="detail-header">
                <h1 class="detail-title">{{ post.title }}</h1>
                <div class="detail-meta">
                    📍 {{ post.address }} | 🏷️ {{ post.categories|join(', ') }}
                </div>
            </div>

            <img src="{{ post.thumbnail }}" alt="{{ post.title }}" class="detail-img">

            <div class="detail-content">
                {{ content | safe }}
            </div>

            <div style="text-align: center;">
                <a href="/" class="back-btn">🗺️ Back to Map</a>
            </div>
        </article>
        
        {% include 'footer.html' %}
    </div>
</body>
</html>
